<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ediciones Digitales - Newsletter Diarios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .diary-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-available {
            background: #d4edda;
            color: #155724;
        }

        .status-unavailable {
            background: #f8d7da;
            color: #721c24;
        }

        .pdf-list {
            list-style: none;
            margin-bottom: 15px;
        }

        .pdf-item {
            padding: 10px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .pdf-name {
            color: #666;
            flex: 1;
            word-break: break-word;
        }

        .pdf-size {
            color: #999;
            margin: 0 10px;
            font-size: 12px;
            white-space: nowrap;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        .no-pdfs {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .empty-state p {
            color: #666;
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover {
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .last-updated {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        footer {
            text-align: center;
            color: #999;
            margin-top: 40px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 Ediciones Digitales</h1>
            <p>Descargas diarias de los periódicos con suscripción</p>
        </header>

        <div id="content" class="loading">
            <div class="spinner"></div>
            <p>Cargando ediciones disponibles...</p>
        </div>
    </div>

    <footer>
        <p>Sistema automático de descarga de ediciones digitales</p>
    </footer>

    <script>
        const DIARIOS = [
            { key: 'ElMercurio', nombre: 'El Mercurio', color: '#0066cc' },
            { key: 'LaTerecra', nombre: 'La Tercera', color: '#cc0000' },
            { key: 'LaSegunda', nombre: 'La Segunda', color: '#ff6600' },
            { key: 'DF', nombre: 'DF', color: '#003399' }
        ];

        async function loadPDFs() {
            try {
                const response = await fetch('data/pdfs-manifest.json');
                if (!response.ok) {
                    showEmptyState();
                    return;
                }

                const manifest = await response.json();
                renderPDFs(manifest);
            } catch (error) {
                console.error('Error loading PDFs:', error);
                showEmptyState();
            }
        }

        function renderPDFs(manifest) {
            let html = '<div class="grid">';

            DIARIOS.forEach(diario => {
                const pdfs = manifest[diario.key] || [];
                const hasContent = pdfs.length > 0;

                html += `
                    <div class="card">
                        <div class="card-header">
                            <span class="diary-name">${diario.nombre}</span>
                            <span class="status-badge ${hasContent ? 'status-available' : 'status-unavailable'}">
                                ${hasContent ? '✓ Disponible' : 'No disponible'}
                            </span>
                        </div>
                        <ul class="pdf-list">
                `;

                if (hasContent) {
                    pdfs.forEach(pdf => {
                        const sizeMB = (pdf.size / (1024 * 1024)).toFixed(2);
                        html += `
                            <li class="pdf-item">
                                <span class="pdf-name">📄 ${pdf.filename}</span>
                                <span class="pdf-size">${sizeMB} MB</span>
                                <a href="pdfs/${pdf.filename}" class="download-btn" download>
                                    ↓ Descargar
                                </a>
                            </li>
                        `;
                    });
                } else {
                    html += '<li class="no-pdfs">Sin descargas aún</li>';
                }

                html += '</ul></div>';
            });

            html += '</div>';

            if (manifest.lastUpdated) {
                html += `<div class="last-updated">Última actualización: ${new Date(manifest.lastUpdated).toLocaleString('es-CL')}</div>`;
            }

            document.getElementById('content').innerHTML = html;
        }

        function showEmptyState() {
            document.getElementById('content').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📁</div>
                    <h2>Sin ediciones disponibles</h2>
                    <p>Los PDFs de las ediciones digitales aparecerán aquí cuando se ejecute el scraper.</p>
                    <p style="font-size: 12px; color: #999;">
                        La descarga se ejecuta automáticamente cada día al procesar las noticias.
                    </p>
                </div>
            `;
        }

        // Cargar PDFs al iniciar
        loadPDFs();

        // Recargar cada 5 minutos
        setInterval(loadPDFs, 5 * 60 * 1000);
    </script>
</body>
</html>
