<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Diarios 📰</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        header p {
            color: #999;
            font-size: 14px;
        }

        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .filter-group input, .filter-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-section {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .category-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .category-header .count {
            float: right;
            background: rgba(255,255,255,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .news-items {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .news-item {
            padding: 15px;
            border-left: 4px solid #667eea;
            background: #f9f9f9;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .news-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .news-item h3 {
            color: #333;
            font-size: 15px;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .news-item .source {
            color: #667eea;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .news-item .summary {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 10px;
            max-height: 120px;
            overflow: hidden;
        }

        .news-item .date {
            color: #999;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .news-item a {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            background: white;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .news-item a:hover {
            background: #667eea;
            color: white;
        }

        .stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stats p {
            color: #666;
            font-size: 14px;
        }

        .pdf-btn {
            background: #27ae60;
            margin-left: auto;
        }

        .pdf-btn:hover {
            background: #229954;
        }

        @media (max-width: 768px) {
            .filters { flex-direction: column; }
            .pdf-btn { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 Newsletter Diarios</h1>
            <p>Noticias de El Mercurio, La Tercera, La Segunda y DF</p>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label>Desde:</label>
                <input type="date" id="dateFrom">
            </div>
            <div class="filter-group">
                <label>Hasta:</label>
                <input type="date" id="dateTo">
            </div>
            <div class="filter-group">
                <label>Categoría:</label>
                <select id="categoryFilter">
                    <option value="">Todas</option>
                    <option value="💼 Economía">💼 Economía</option>
                    <option value="🏛️ Política">🏛️ Política</option>
                    <option value="⚽ Deportes">⚽ Deportes</option>
                    <option value="🌍 Internacional">🌍 Internacional</option>
                    <option value="💻 Tecnología">💻 Tecnología</option>
                    <option value="🎨 Cultura">🎨 Cultura</option>
                    <option value="🏥 Salud">🏥 Salud</option>
                    <option value="🎰 Casinos">🎰 Casinos de Juego + Online</option>
                </select>
            </div>
            <button onclick="filterNews()">Filtrar</button>
            <button class="pdf-btn" onclick="exportPDF()">📄 Descargar PDF</button>
        </div>

        <div class="stats" id="stats"></div>
        <div class="categories" id="newsContainer"></div>
    </div>

    <script>
        const sampleNews = [
            { title: "Chile lidera inversión en IA en Latinoamérica", source: "El Mercurio", summary: "El país se posiciona como referente regional en tecnología de inteligencia artificial con inversiones por más de USD 500 millones en los últimos dos años.", link: "https://elmercurio.com", date: "2026-07-18", category: "💻 Tecnología" },
            { title: "Banco Central mantiene tasa de interés en 5.25%", source: "DF", summary: "La autoridad monetaria decidió mantener sin cambios la Tasa de Política Monetaria en su última reunión, considerando la evolución de la inflación y el crecimiento económico.", link: "https://df.cl", date: "2026-07-18", category: "💼 Economía" },
            { title: "Colo-Colo avanza en Copa Libertadores", source: "La Tercera", summary: "El equipo albaiceleste derrotó 2-1 a rival paraguayo y se clasifica a la siguiente ronda de la máxima competición sudamericana de clubes profesionales.", link: "https://latercera.com", date: "2026-07-18", category: "⚽ Deportes" },
            { title: "Gobierno anuncia reforma tributaria para 2027", source: "La Segunda", summary: "El Ejecutivo presentó su propuesta de reforma tributaria que busca aumentar recaudación en USD 2 mil millones anuales para financiar programas sociales y educativos.", link: "https://lasegunda.com", date: "2026-07-17", category: "🏛️ Política" },
            { title: "Plataforma online de casino registra crecimiento", source: "El Mercurio", summary: "Operadores de juego en línea reportan aumento de 45% en usuarios activos durante el último trimestre, con especial énfasis en juegos de azar y apuestas deportivas.", link: "https://elmercurio.com", date: "2026-07-18", category: "🎰 Casinos" },
            { title: "Trump retira apoyo a acuerdos climáticos", source: "El Mercurio", summary: "El expresidente estadounidense anuncia su intención de retirarse de los acuerdos internacionales de cambio climático si vuelve a ganar las elecciones presidenciales.", link: "https://elmercurio.com", date: "2026-07-17", category: "🌍 Internacional" },
            { title: "Nuevo tratamiento para cáncer avanza en ensayos", source: "DF", summary: "Investigadores chilenos participan en estudio que demuestra efectividad de nueva terapia génica para tratar cáncer de pulmón avanzado con resultados prometedores.", link: "https://df.cl", date: "2026-07-17", category: "🏥 Salud" },
            { title: "Festival de cine abre convocatoria de películas", source: "La Tercera", summary: "Abre la convocatoria para cortometrajes y documentales nacionales que participarán en la próxima edición del festival de cine más importante de Latinoamérica.", link: "https://latercera.com", date: "2026-07-16", category: "🎨 Cultura" },
        ];

        const categoryKeywords = {
            "💼 Economía": ["economía", "banco", "dólar", "bolsa", "empresa", "negocios", "inversión"],
            "🏛️ Política": ["gobierno", "diputado", "senado", "congreso", "elección", "ministro"],
            "⚽ Deportes": ["fútbol", "deportes", "equipo", "jugador", "liga"],
            "🌍 Internacional": ["mundo", "país", "trump", "internacional"],
            "💻 Tecnología": ["tecnología", "app", "software", "ia", "inteligencia artificial"],
            "🎨 Cultura": ["arte", "música", "película", "cultura", "cine"],
            "🏥 Salud": ["salud", "médico", "covid", "virus", "enfermedad"],
            "🎰 Casinos": ["casino", "juego", "apuestas", "poker", "online", "gaming"]
        };

        function categorizeNews(news) {
            const text = (news.title + " " + news.summary).toLowerCase();
            for (const [category, keywords] of Object.entries(categoryKeywords)) {
                if (keywords.some(keyword => text.includes(keyword))) {
                    return category;
                }
            }
            return "📚 Otros";
        }

        function truncateSummary(text, maxChars = 200) {
            if (text.length <= maxChars) return text;
            return text.substring(0, maxChars) + "...";
        }

        function renderNews(newsData = sampleNews) {
            const container = document.getElementById('newsContainer');
            const grouped = {};

            newsData.forEach(news => {
                const category = news.category || categorizeNews(news);
                if (!grouped[category]) grouped[category] = [];
                grouped[category].push({ ...news, category });
            });

            container.innerHTML = Object.entries(grouped).map(([category, items]) => `
                <div class="category-section">
                    <div class="category-header">
                        ${category}
                        <span class="count">${items.length}</span>
                    </div>
                    <div class="news-items">
                        ${items.map(item => `
                            <div class="news-item">
                                <div class="source">${item.source}</div>
                                <h3>${item.title}</h3>
                                <div class="date">${new Date(item.date).toLocaleDateString('es-CL')}</div>
                                <div class="summary">${truncateSummary(item.summary, 200)}</div>
                                <a href="${item.link}" target="_blank">Leer más →</a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('stats').innerHTML = `
                <p><strong>${newsData.length} noticias</strong> de <strong>${new Set(newsData.map(n => n.source)).size} medios</strong></p>
            `;
        }

        function filterNews() {
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const categoryFilter = document.getElementById('categoryFilter').value;

            let filtered = sampleNews;
            if (dateFrom) filtered = filtered.filter(n => n.date >= dateFrom);
            if (dateTo) filtered = filtered.filter(n => n.date <= dateTo);
            if (categoryFilter) filtered = filtered.filter(n => (n.category || categorizeNews(n)) === categoryFilter);

            renderNews(filtered.length > 0 ? filtered : []);
        }

        function exportPDF() {
            const element = document.getElementById('newsContainer');
            const opt = {
                margin: 10,
                filename: `newsletter-${new Date().toISOString().split('T')[0]}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const week = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('dateTo').value = today.toISOString().split('T')[0];
            document.getElementById('dateFrom').value = week.toISOString().split('T')[0];
            renderNews();
        });
    </script>
</body>
</html>
