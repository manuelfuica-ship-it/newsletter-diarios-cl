<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Diarios 📰</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .filter-group input, .filter-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="search"] {
            flex: 1;
            min-width: 250px;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: #5568d3;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .chart-container h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-section {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .category-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .category-header .count {
            float: right;
            background: rgba(255,255,255,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .news-items {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .news-item {
            padding: 15px;
            border-left: 4px solid #667eea;
            background: #f9f9f9;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .news-item h3 {
            color: #333;
            font-size: 15px;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .news-item .source {
            color: #667eea;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .news-item .summary {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            margin: 8px 0;
        }

        .news-item .date {
            color: #999;
            font-size: 12px;
        }

        .news-item a {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .pdf-btn {
            background: #27ae60;
        }

        .pdf-btn:hover {
            background: #229954;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 Newsletter Diarios</h1>
            <p>Recopilador automático de noticias de medios chilenos</p>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('news')">📰 Noticias</button>
                <button class="tab" onclick="switchTab('stats')">📊 Estadísticas</button>
            </div>
        </header>

        <!-- TAB NOTICIAS -->
        <div id="news" class="tab-content active">
            <div class="filters">
                <div class="filter-group">
                    <input type="search" id="searchInput" placeholder="Buscar noticias..." onkeyup="filterNews()">
                </div>
                <div class="filter-group">
                    <label>Desde:</label>
                    <input type="date" id="dateFrom" onchange="filterNews()">
                </div>
                <div class="filter-group">
                    <label>Hasta:</label>
                    <input type="date" id="dateTo" onchange="filterNews()">
                </div>
                <div class="filter-group">
                    <label>Categoría:</label>
                    <select id="categoryFilter" onchange="filterNews()">
                        <option value="">Todas</option>
                        <option value="💼 Economía">💼 Economía</option>
                        <option value="🏛️ Política">🏛️ Política</option>
                        <option value="⚽ Deportes">⚽ Deportes</option>
                        <option value="🌍 Internacional">🌍 Internacional</option>
                        <option value="💻 Tecnología">💻 Tecnología</option>
                        <option value="🎨 Cultura">🎨 Cultura</option>
                        <option value="🏥 Salud">🏥 Salud</option>
                        <option value="🎰 Casinos">🎰 Casinos de Juego + Online</option>
                    </select>
                </div>
                <button class="pdf-btn" onclick="exportPDF()">📄 PDF</button>
            </div>

            <div class="stats">
                <p><span id="newsCount">0</span> noticias • <span id="diaryCount">0</span> medios</p>
            </div>

            <div class="categories" id="newsContainer"></div>
        </div>

        <!-- TAB ESTADÍSTICAS -->
        <div id="stats" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="number" id="totalNews">0</div>
                    <div class="label">Total de Noticias</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalDiaries">0</div>
                    <div class="label">Medios</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalDays">0</div>
                    <div class="label">Días de Datos</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="avgPerDay">0</div>
                    <div class="label">Promedio/Día</div>
                </div>
            </div>

            <div class="charts">
                <div class="chart-container">
                    <h3>Noticias por Medio</h3>
                    <canvas id="diaryChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Noticias por Categoría</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Noticias últimos 7 días</h3>
                    <canvas id="trendsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allNews = [];
        let charts = {};

        const categoryKeywords = {
            "💼 Economía": ["economía", "banco", "dólar", "bolsa", "empresa"],
            "🏛️ Política": ["gobierno", "diputado", "congreso", "ministro"],
            "⚽ Deportes": ["fútbol", "deportes", "equipo", "jugador"],
            "🌍 Internacional": ["mundo", "país", "trump", "internacional"],
            "💻 Tecnología": ["tecnología", "app", "ia", "inteligencia artificial"],
            "🎨 Cultura": ["arte", "música", "película", "cine"],
            "🏥 Salud": ["salud", "médico", "covid", "virus"],
            "🎰 Casinos": ["casino", "juego", "apuestas", "online"]
        };

        function categorizeNews(news) {
            const text = (news.title + " " + (news.description || "")).toLowerCase();
            for (const [cat, keywords] of Object.entries(categoryKeywords)) {
                if (keywords.some(k => text.includes(k))) return cat;
            }
            return "📚 Otros";
        }

        function truncateSummary(text, max = 200) {
            if (!text) return "";
            return text.length > max ? text.substring(0, max) + "..." : text;
        }

        async function loadNews() {
            try {
                const response = await fetch('data/news.json');
                if (response.ok) {
                    allNews = await response.json();
                    allNews.forEach(n => n.category = n.category || categorizeNews(n));
                } else {
                    loadSampleNews();
                }
            } catch (e) {
                console.log("Usando datos de ejemplo");
                loadSampleNews();
            }
            renderNews();
            updateStats();
        }

        function loadSampleNews() {
            allNews = [
                { title: "Chile lidera en tecnología", source: "El Mercurio", description: "Inversiones en IA crecen...", link: "#", date: new Date().toISOString().split('T')[0], category: "💻 Tecnología", diary: "El Mercurio" },
                { title: "Banco Central mantiene tasa", source: "DF", description: "Política monetaria sin cambios...", link: "#", date: new Date().toISOString().split('T')[0], category: "💼 Economía", diary: "DF" },
                { title: "Colo-Colo en Libertadores", source: "La Tercera", description: "Equipo avanza en competición...", link: "#", date: new Date().toISOString().split('T')[0], category: "⚽ Deportes", diary: "La Tercera" },
            ];
        }

        function renderNews(newsData = allNews) {
            const container = document.getElementById('newsContainer');
            const grouped = {};

            newsData.forEach(news => {
                const cat = news.category;
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(news);
            });

            container.innerHTML = Object.entries(grouped).map(([cat, items]) => `
                <div class="category-section">
                    <div class="category-header">${cat} <span class="count">${items.length}</span></div>
                    <div class="news-items">
                        ${items.map(item => `
                            <div class="news-item">
                                <div class="source">${item.source || item.diary}</div>
                                <h3>${item.title}</h3>
                                <div class="date">${new Date(item.date).toLocaleDateString('es-CL')}</div>
                                <div class="summary">${truncateSummary(item.description)}</div>
                                <a href="${item.link}" target="_blank">Leer más →</a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('newsCount').textContent = newsData.length;
            document.getElementById('diaryCount').textContent = new Set(newsData.map(n => n.source || n.diary)).size;
        }

        function filterNews() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const category = document.getElementById('categoryFilter').value;

            let filtered = allNews.filter(n => {
                const matchSearch = !search || n.title.toLowerCase().includes(search) || (n.description || "").toLowerCase().includes(search);
                const matchDate = (!dateFrom || n.date >= dateFrom) && (!dateTo || n.date <= dateTo);
                const matchCategory = !category || n.category === category;
                return matchSearch && matchDate && matchCategory;
            });

            renderNews(filtered);
        }

        function updateStats() {
            const total = allNews.length;
            const diaries = new Set(allNews.map(n => n.source || n.diary)).size;
            const days = new Set(allNews.map(n => n.date)).size;
            const avg = days > 0 ? Math.round(total / days) : 0;

            document.getElementById('totalNews').textContent = total;
            document.getElementById('totalDiaries').textContent = diaries;
            document.getElementById('totalDays').textContent = days;
            document.getElementById('avgPerDay').textContent = avg;

            // Gráfico por medio
            const byDiary = {};
            allNews.forEach(n => {
                const d = n.source || n.diary;
                byDiary[d] = (byDiary[d] || 0) + 1;
            });

            if (charts.diary) charts.diary.destroy();
            const ctx1 = document.getElementById('diaryChart').getContext('2d');
            charts.diary = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(byDiary),
                    datasets: [{
                        data: Object.values(byDiary),
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe', '#43e97b', '#fa709a', '#fee140']
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });

            // Gráfico por categoría
            const byCat = {};
            allNews.forEach(n => {
                byCat[n.category] = (byCat[n.category] || 0) + 1;
            });

            if (charts.category) charts.category.destroy();
            const ctx2 = document.getElementById('categoryChart').getContext('2d');
            charts.category = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: Object.keys(byCat),
                    datasets: [{
                        label: 'Noticias',
                        data: Object.values(byCat),
                        backgroundColor: '#667eea'
                    }]
                },
                options: { responsive: true, indexAxis: 'y' }
            });

            // Gráfico de tendencias
            const byDate = {};
            allNews.forEach(n => {
                byDate[n.date] = (byDate[n.date] || 0) + 1;
            });

            const sortedDates = Object.keys(byDate).sort();
            if (charts.trends) charts.trends.destroy();
            const ctx3 = document.getElementById('trendsChart').getContext('2d');
            charts.trends = new Chart(ctx3, {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [{
                        label: 'Noticias/día',
                        data: sortedDates.map(d => byDate[d]),
                        borderColor: '#667eea',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(102, 126, 234, 0.1)'
                    }]
                },
                options: { responsive: true }
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        function exportPDF() {
            const element = document.getElementById('newsContainer');
            const opt = {
                margin: 10,
                filename: `newsletter-${new Date().toISOString().split('T')[0]}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Inicializar
        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const week = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('dateTo').value = today.toISOString().split('T')[0];
            document.getElementById('dateFrom').value = week.toISOString().split('T')[0];
            loadNews();
        });
    </script>
</body>
</html>
