<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias - Newsletter Diarios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            height: 100%;
            color: #0f172a;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            gap: 15px;
            flex-wrap: wrap;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-actions input[type="search"] {
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.25);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            min-width: 200px;
        }

        .header-actions input[type="search"]::placeholder {
            color: rgba(255,255,255,.7);
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }

        .btn-secondary {
            background: rgba(255,255,255,.2);
            color: white;
            border: 1px solid rgba(255,255,255,.3);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,.3);
        }

        /* Main Container */
        main {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 14px;
            padding: 14px 20px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
        }

        /* Sidebar */
        aside {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            height: fit-content;
            position: sticky;
            top: 70px;
        }

        .filter-section {
            margin-bottom: 15px;
        }

        .filter-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 8px;
            padding: 0 8px;
            letter-spacing: 0.5px;
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-item {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            background: #f1f5f9;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .filter-item:hover {
            background: #e2e8f0;
        }

        .filter-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Content */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .news-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .news-card:hover {
            border-color: #667eea;
            box-shadow: 0 2px 12px rgba(102, 126, 234, .15);
            transform: translateY(-1px);
        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .news-source {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .news-category {
            display: inline-block;
            background: #f1f5f9;
            color: #0f172a;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .news-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #0f172a;
            line-height: 1.4;
        }

        .news-description {
            font-size: 13px;
            color: #475569;
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
        }

        .news-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .news-link {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .news-link:hover {
            background: #764ba2;
            transform: translateY(-1px);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state h2 {
            color: #0f172a;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #64748b;
            font-size: 13px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 40px;
        }

        .modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
            border: none;
            background: none;
        }

        .modal-close:hover {
            color: #0f172a;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #0f172a;
        }

        .modal-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #64748b;
        }

        .modal-body {
            color: #0f172a;
            line-height: 1.7;
            font-size: 14px;
        }

        .modal-body p {
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }

            aside {
                display: none;
            }

            header h1 {
                font-size: 18px;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions input {
                flex: 1;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>📰 Noticias</h1>
            <div class="header-actions">
                <input type="search" id="searchInput" placeholder="Buscar noticias...">
                <button class="btn" onclick="location.href='index.html'">← Volver</button>
                <button class="btn btn-secondary" onclick="loadNews()">🔄 Actualizar</button>
            </div>
        </div>
    </header>

    <main>
        <aside>
            <div class="filter-section">
                <div class="filter-title">Diario</div>
                <ul class="filter-list" id="diaryFilter"></ul>
            </div>
            <div class="filter-section">
                <div class="filter-title">Categoría</div>
                <ul class="filter-list" id="categoryFilter"></ul>
            </div>
        </aside>

        <div class="news-list" id="newsList"></div>
    </main>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allNews = [];
        let selectedDiary = 'Todos';
        let selectedCategory = 'Todos';

        async function loadNews() {
            try {
                const response = await fetch('data/news.json?t=' + Date.now());
                if (!response.ok) throw new Error('Error cargando datos');

                allNews = await response.json();
                console.log('Noticias cargadas:', allNews.length);

                if (!allNews || allNews.length === 0) {
                    document.getElementById('newsList').innerHTML =
                        '<div class="empty-state"><div class="empty-icon">📭</div><h2>Sin noticias</h2><p>No hay noticias disponibles</p></div>';
                    return;
                }

                renderFilters();
                renderNews();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('newsList').innerHTML =
                    '<div class="empty-state"><div class="empty-icon">⚠️</div><h2>Error</h2><p>' + error.message + '</p></div>';
            }
        }

        function renderFilters() {
            // Diarios
            const diaries = ['Todos', ...new Set(allNews.map(n => n.diary))];
            document.getElementById('diaryFilter').innerHTML = diaries.map(diary => `
                <li class="filter-item ${diary === selectedDiary ? 'active' : ''}"
                    onclick="filterByDiary('${diary}')">
                    ${diary}
                </li>
            `).join('');

            // Categorías
            const categories = ['Todos', ...new Set(allNews.map(n => n.category || 'General'))];
            document.getElementById('categoryFilter').innerHTML = categories.map(cat => `
                <li class="filter-item ${cat === selectedCategory ? 'active' : ''}"
                    onclick="filterByCategory('${cat}')">
                    ${cat}
                </li>
            `).join('');
        }

        function filterByDiary(diary) {
            selectedDiary = diary;
            renderFilters();
            renderNews();
        }

        function filterByCategory(category) {
            selectedCategory = category;
            renderFilters();
            renderNews();
        }

        function renderNews() {
            const search = document.getElementById('searchInput').value.toLowerCase();

            const filtered = allNews.filter(news => {
                const matchDiary = selectedDiary === 'Todos' || news.diary === selectedDiary;
                const matchCategory = selectedCategory === 'Todos' || (news.category || 'General') === selectedCategory;
                const matchSearch = !search ||
                    news.title.toLowerCase().includes(search) ||
                    (news.description || '').toLowerCase().includes(search);

                return matchDiary && matchCategory && matchSearch;
            });

            const container = document.getElementById('newsList');

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1"><div class="empty-icon">📭</div><h2>Sin resultados</h2><p>Intenta cambiar los filtros</p></div>';
                return;
            }

            container.innerHTML = filtered.map((news, idx) => `
                <div class="news-card" onclick="openModal(${allNews.indexOf(news)})">
                    <div class="news-header">
                        <span class="news-source">${news.diary}</span>
                        <span class="news-category">${news.category || 'General'}</span>
                    </div>
                    <h3 class="news-title">${escapeHtml(news.title)}</h3>
                    <p class="news-description">${escapeHtml(news.description || 'Sin descripción')}</p>
                    <div class="news-footer">
                        <span class="news-date">📅 ${formatDate(news.published || news.timestamp)}</span>
                        <button class="news-link">Leer más →</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(index) {
            const news = allNews[index];
            if (!news) return;

            const modal = document.getElementById('modal');
            const body = document.getElementById('modalBody');

            body.innerHTML = `
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">${escapeHtml(news.title)}</div>
                <div class="modal-meta">
                    <strong>${news.diary}</strong>
                    <span>${news.category || 'General'}</span>
                    <span>📅 ${formatDate(news.published || news.timestamp)}</span>
                </div>
                <div class="modal-body">
                    ${(news.description || '').split('\n').map(p => p.trim()).filter(p => p).map(p => `<p>${escapeHtml(p)}</p>`).join('')}
                </div>
                <div style="margin-top: 20px;">
                    <a href="${news.link}" target="_blank" class="btn" style="color: white; background: #667eea; text-decoration: none;">
                        Abrir en ${news.diary} →
                    </a>
                </div>
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                if (isNaN(date)) return dateStr;
                return date.toLocaleDateString('es-CL', { day: '2-digit', month: 'short', year: 'numeric' });
            } catch {
                return dateStr;
            }
        }

        // Búsqueda en tiempo real
        document.getElementById('searchInput')?.addEventListener('keyup', renderNews);

        // Cargar al iniciar
        loadNews();
    </script>
</body>
</html>
